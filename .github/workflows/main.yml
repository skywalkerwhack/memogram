name: Main

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test ./...

  docker-cache:
    name: Warm Docker cache
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3.11.1

      - name: Warm Docker build cache
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671 # GitHub Docs pin
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=memogram-image
          cache-to: type=gha,mode=max,scope=memogram-image
